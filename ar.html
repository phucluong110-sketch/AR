<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Smart-Print WebAR Test</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker preset="hiro">
            <a-plane position="0 0.5 0" rotation="-60 0 0" width="2" height="1.2" color="#FFB020">
                <a-text value="SO HOA HIEN TRUONG AR" align="center" position="0 0.4 0.05" width="4" color="#000" font="mozillavr"></a-text>
                <a-text value="Pallet: PLL-001" align="left" position="-0.8 0 0.05" width="3.5" color="#fff"></a-text>
                <a-text value="Ma Don: H1608" align="left" position="-0.8 -0.3 0.05" width="3.5" color="#fff"></a-text>
            </a-plane>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
