<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Smart-Print WebAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-plane position="0 0.5 0" rotation="-60 0 0" width="2.8" height="1.8" color="#FFB020" opacity="0.95">
                <a-text value="SO HOA HIEN TRUONG AR" align="center" position="0 0.6 0.05" width="4.5" color="#000" font="mozillavr"></a-text>
                <a-text id="txt-pallet" value="Pallet ID: Dang doc..." align="left" position="-1.2 0.2 0.05" width="4" color="#fff"></a-text>
                <a-text id="txt-don" value="Ma Don: Dang doc..." align="left" position="-1.2 -0.1 0.05" width="4" color="#fff"></a-text>
                <a-text id="txt-status" value="Trang Thai: Dang doc..." align="left" position="-1.2 -0.4 0.05" width="4" color="#000"></a-text>
            </a-plane>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbzGjkFDvad-MVP-UxWmb64sko-qXIhZTSM3iu32CX9yefHumLKkt2JMeZxrk3SN4YbmBQ/exec";

        async function docDuLieuAR() {
            try {
                let response = await fetch(URL_API);
                let result = await response.json();
                
                if (result.status === "success" && result.data) {
                    let myPallet = result.data.find(p => p.ma_pallet === "PLL-001");
                    if (myPallet) {
                        document.querySelector("#txt-pallet").setAttribute("value", "Pallet ID: " + myPallet.ma_pallet);
                        document.querySelector("#txt-don").setAttribute("value", "Ma Don: " + (myPallet.ma_don_hang || "Trong"));
                        document.querySelector("#txt-status").setAttribute("value", "Trang Thai: " + (myPallet.trang_thai || "Trong"));
                    }
                }
            } catch (e) {
                console.log("Lỗi đồng bộ:", e);
            }
        }
        docDuLieuAR();
        setInterval(docDuLieuAR, 3000);
    </script>
</body>
</html>
